    /* Header */

      top: 0;

      backdrop-filter: blur(12px);

      transition: all 0.3s ease;

    .header-inner {
      max-width: 1200px;

      padding: 0 24px;

    .logo {

    .nav-links {

      align-items: center;

    .nav-links a {

      font-weight: 500;
      color: var(--text);
      position: relative;
      padding: 4px 0;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-dark);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--primary-dark); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--primary-dark) !important;
      color: white !important;
      padding: 10px 24px !important;
      border-radius: 50px !important;
      font-weight: 600 !important;
      transition: transform 0.3s, box-shadow 0.3s !important;
    }
    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(3, 144, 214, 0.3);
    }
    .nav-cta::after { display: none !important; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 1001;
    }
    .hamburger span {
      width: 24px;
      height: 2px;
      background: var(--text);
      transition: all 0.3s;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* Page Hero */
    .page-hero {
      padding: 140px 48px 60px;
      background: linear-gradient(180deg, #e7f4fb 0%, #ffffff 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 10%;
      width: 200px;
      height: 200px;
      background: rgba(3, 144, 214, 0.08);
      border-radius: 50%;
      filter: blur(40px);
    }
    .page-hero::after {
      content: '';
      position: absolute;
      bottom: 10%;
      right: 10%;
      width: 250px;
      height: 250px;
      background: rgba(255, 211, 77, 0.15);
      border-radius: 50%;
      filter: blur(50px);

    .page-hero-inner { position: relative; z-index: 1; }

    /* Floating bubbles decoration */

      height: 100%;

  <script>
    // Google Sheets CSV endpoint (sheet must be shared as "anyone with link can view")
    const SHEET_ID = '1umjJRX_QhRxvbCQWSArZpS1KvB5E8g8VO8MS6y7EKgg';
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&gid=0&_=' + Date.now();

    function getInitial(name) {
      const trimmed = (name || '').trim();
      return trimmed ? trimmed.charAt(0) : '?';
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
    }

    // Simple CSV parser that handles quoted values with commas/newlines
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
          else if (c === '"') { inQuotes = false; }
          else { cell += c; }
        } else {
          if (c === '"') { inQuotes = true; }
          else if (c === ',') { row.push(cell); cell = ''; }
          else if (c === '\n' || c === '\r') {
            if (c === '\r' && text[i+1] === '\n') i++;
            row.push(cell); rows.push(row);
            row = []; cell = '';
          } else { cell += c; }
        }
      }
      if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
      return rows;
    }

    function parsePhotoUrls(raw) {
      if (!raw) return [];
      // Google Forms upload field returns URLs separated by ", " (comma+space) when multiple files
      return raw.split(/,\s*/).map(s => s.trim()).filter(s => s).map(toThumbnailUrl);
    }

    function toThumbnailUrl(url) {
      // Extract Google Drive file ID from various URL formats
      let m = url.match(/[?&]id=([\w-]+)/);
      if (!m) m = url.match(/\/file\/d\/([\w-]+)/);
      if (!m) m = url.match(/\/d\/([\w-]+)/);
      if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w1200';
      return url;
    }

    async function fetchEntries() {
      try {
        const res = await fetch(SHEET_CSV_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        const rows = parseCSV(text);
        if (rows.length < 2) return [];
        // Header: タイムスタンプ, 名前(非掲載), タイトル, 本文, 学年, イニシャル, 写真URL
        const entries = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.length < 4) continue;
          const timestamp = r[0];
          const title = r[2];
          const body = r[3];
          const year = (r[4] || '').trim();
          const initials = (r[5] || '').trim();
          const photos = parsePhotoUrls(r[6] || '');
          if (!title && !body) continue;
          let author = initials || '匿名';
          if (year) author += ' / ' + year;
          entries.push({
            author: author,
            title: title || '（無題）',
            body: body || '',
            photos: photos,
            date: timestamp ? timestamp.split(' ')[0].replace(/\//g, '-') : ''
          });
        }
        return entries.sort((a, b) => new Date(b.date) - new Date(a.date));
      } catch (e) {
        console.error('日記の取得に失敗:', e);
        return null;
      }
    }

    function renderEntries(entries) {
      const list = document.getElementById('diaryList');
      const toc = document.getElementById('diaryToc');
      if (!entries || entries.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>まだ日記がありません。最初の投稿をしてみよう！</p></div>';
        toc.style.display = 'none';
        return;
      }
      // assign IDs and render entries
      list.innerHTML = entries.map((entry, idx) => {
        entry._id = 'entry-' + idx;
        const photosHtml = (entry.photos && entry.photos.length)
          ? `<div class="diary-photos">${entry.photos.map(url => `<img class="diary-photo" src="${escapeHtml(url)}" alt="" loading="lazy" onclick="openPhoto('${escapeHtml(url)}')" onerror="this.style.display='none'">`).join('')}</div>`
          : '';
        return `
        <article class="diary-entry diary-entry-anchor" id="${entry._id}">
          <div class="diary-meta">
            <span class="diary-author">
              <span class="diary-avatar">${escapeHtml(getInitial(entry.author))}</span>
              ${escapeHtml(entry.author)}
            </span>
            <span class="diary-date">${escapeHtml(formatDate(entry.date))}</span>
          </div>
          <h2 class="diary-title">${escapeHtml(entry.title)}</h2>
          <div class="diary-body">${escapeHtml(entry.body)}</div>
          ${photosHtml}
        </article>
      `;
      }).join('');
      renderToc(entries);
    }

    function openPhoto(url) {
      const modal = document.getElementById('photoModal');
      document.getElementById('photoModalImg').src = url;
      modal.classList.add('open');
    }
    function closePhoto() {
      document.getElementById('photoModal').classList.remove('open');
      document.getElementById('photoModalImg').src = '';
    }

    function renderToc(entries) {
      const toc = document.getElementById('diaryToc');
      const tocBody = document.getElementById('tocBody');
      const tocCount = document.getElementById('tocCount');
      // group by year-month
      const groups = {};
      const order = [];
      entries.forEach(entry => {
        const d = new Date(entry.date);
        let key, label;
        if (isNaN(d.getTime())) {
          key = 'unknown';
          label = '日付不明';
        } else {
          key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
          label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
        }
        if (!groups[key]) {
          groups[key] = { label: label, items: [] };
          order.push(key);
        }
        groups[key].items.push(entry);
      });
      tocBody.innerHTML = order.map(key => {
        const g = groups[key];
        return `
          <div class="diary-toc-month">
            <div class="diary-toc-month-label">${escapeHtml(g.label)}</div>
            <ul class="diary-toc-list">
              ${g.items.map(entry => {
                const d = new Date(entry.date);
                const dayLabel = isNaN(d.getTime()) ? '' : (d.getMonth() + 1) + '/' + d.getDate();
                return `
                  <li class="diary-toc-item" onclick="jumpToEntry('${entry._id}')">
                    <span class="diary-toc-date">${escapeHtml(dayLabel)}</span>
                    <span class="diary-toc-entry-title">${escapeHtml(entry.title)}</span>
                  </li>
                `;
              }).join('')}
            </ul>
          </div>
        `;
      }).join('');
      tocCount.textContent = '（全 ' + entries.length + ' 件）';
      toc.style.display = '';
    }

    function jumpToEntry(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function toggleToc() {
      document.getElementById('diaryToc').classList.toggle('collapsed');
    }

    function renderError() {
      document.getElementById('diaryList').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div>' +
        '<p>日記を読み込めませんでした。<br>少し時間をおいて再度お試しください。</p></div>';
    }

    function renderLoading() {
      document.getElementById('diaryList').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⏳</div><p>日記を読み込んでいます...</p></div>';
    }

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('active');
    }

    document.addEventListener('click', function(e) {
      if (e.target.closest('.nav-links a')) {
        document.getElementById('navLinks').classList.remove('open');
        document.getElementById('hamburger').classList.remove('active');
      }
    });

    (async function init() {
      renderLoading();
      const entries = await fetchEntries();
      if (entries === null) renderError();
      else renderEntries(entries);
    })();
  </script>
</body>
</html>
